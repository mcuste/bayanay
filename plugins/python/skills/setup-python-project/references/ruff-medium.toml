# Ruff Preset: Medium — Recommended starting point for serious projects
# Broad rule coverage with noisy rules silenced. Security checks included.

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = [
    "E4", "E7", "E9",    # pycodestyle errors (subset)
    "F",                   # pyflakes
    "I",                   # isort
    "UP",                  # pyupgrade
    "B",                   # bugbear
    "S",                   # bandit security
    "N",                   # pep8-naming
    "C4",                  # comprehensions
    "SIM",                 # simplify
    "T20",                 # print statements
    "T10",                 # debugger
    "DTZ",                 # naive datetime
    "PIE",                 # misc lint
    "RET",                 # return consistency
    "PTH",                 # pathlib
    "PERF",                # performance
    "FURB",                # refurb
    "LOG",                 # logging
    "RUF",                 # ruff-specific
]
ignore = [
    "S101",                # assert (handled via per-file-ignores)
    "RET504",              # unnecessary assignment before return
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "PLR2004"]
